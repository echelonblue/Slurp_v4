---
services:
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird_overseerr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY_OVERSEERR}
      - NB_HOSTNAME=overseerr
    volumes:
      - ./config/config_netbird_overseerr/etc:/etc/netbird
      - ./config/config_netbird_overseerr/var:/var/lib/netbird
    restart: unless-stopped

  overseerr:
    image: lscr.io/linuxserver/overseerr:latest
    container_name: overseerr
    network_mode: service:netbird
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./config/config_overseerr:/config
    depends_on:
      - netbird
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_overseerr
    network_mode: service:netbird
    volumes:
      - ./caddy/Caddyfile.overseerr:/etc/caddy/Caddyfile:ro
      - ./config/config_caddy_overseerr/data:/data
      - ./config/config_caddy_overseerr/config:/config
    depends_on:
      - netbird
      - overseerr
    restart: unless-stopped
