---
services:
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird_spotweb
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY_SPOTWEB}
      - NB_HOSTNAME=spotweb
      - NB_ROSENPASS_ENABLED=true
      - NB_ROSENPASS_PERMISSIVE=true
    volumes:
      - ./config/config_netbird_spotweb/etc:/etc/netbird
      - ./config/config_netbird_spotweb/var:/var/lib/netbird
    restart: unless-stopped

  db:
    image: mariadb:latest
    container_name: db_spotweb
    network_mode: service:netbird
    environment:
      - MYSQL_ROOT_PASSWORD=${SPOTWEB_DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=spotweb
      - MYSQL_USER=spotweb
      - MYSQL_PASSWORD=${SPOTWEB_DB_PASSWORD}
    volumes:
      - ./config/config_spotweb_db:/var/lib/mysql
    depends_on:
      - netbird
    restart: unless-stopped

  spotweb:
    image: jgeusebroek/spotweb:latest
    container_name: spotweb
    network_mode: service:netbird
    environment:
      - TZ=Europe/Amsterdam
      - SPOTWEB_DB_TYPE=pdo_mysql
      - SPOTWEB_DB_HOST=127.0.0.1
      - SPOTWEB_DB_PORT=3306
      - SPOTWEB_DB_NAME=spotweb
      - SPOTWEB_DB_USER=spotweb
      - SPOTWEB_DB_PASS=${SPOTWEB_DB_PASSWORD}
    volumes:
      - ./config/config_spotweb:/config
    depends_on:
      - netbird
      - db
    restart: unless-stopped

  retriever:
    image: jgeusebroek/spotweb:latest
    container_name: retriever_spotweb
    network_mode: service:netbird
    entrypoint: >
      sh -c "while true; do php /var/www/spotweb/retrieve.php; sleep 1800; done"
    environment:
      - TZ=Europe/Amsterdam
      - SPOTWEB_DB_TYPE=pdo_mysql
      - SPOTWEB_DB_HOST=127.0.0.1
      - SPOTWEB_DB_PORT=3306
      - SPOTWEB_DB_NAME=spotweb
      - SPOTWEB_DB_USER=spotweb
      - SPOTWEB_DB_PASS=${SPOTWEB_DB_PASSWORD}
    volumes:
      - ./config/config_spotweb:/config
    depends_on:
      - netbird
      - db
      - spotweb
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_spotweb
    network_mode: service:netbird
    volumes:
      - ./caddy/Caddyfile.spotweb:/etc/caddy/Caddyfile:ro
      - ./config/config_caddy_spotweb/data:/data
      - ./config/config_caddy_spotweb/config:/config
    depends_on:
      - netbird
      - spotweb
    restart: unless-stopped
