---
services:
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird_lingarr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY_LINGARR}
      - NB_HOSTNAME=lingarr
      - NB_ROSENPASS_ENABLED=true
      - NB_ROSENPASS_PERMISSIVE=true
    volumes:
      - ./config/config_netbird_lingarr/etc:/etc/netbird
      - ./config/config_netbird_lingarr/var:/var/lib/netbird
    restart: unless-stopped

  lingarr:
    image: lingarr/lingarr:latest
    container_name: lingarr
    network_mode: service:netbird
    environment:
      - TZ=Europe/Amsterdam
      - OLLAMA_BASE_URL=http://${OLLAMA_HOST}:11434
    volumes:
      - ./config/config_lingarr:/app/storage
      - ./tv:/tv
      - ./movies:/movies
    depends_on:
      - netbird
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_lingarr
    network_mode: service:netbird
    volumes:
      - ./caddy/Caddyfile.lingarr:/etc/caddy/Caddyfile:ro
      - ./config/config_caddy_lingarr/data:/data
      - ./config/config_caddy_lingarr/config:/config
    depends_on:
      - netbird
      - lingarr
    restart: unless-stopped
