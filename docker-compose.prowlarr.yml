---
services:
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird_prowlarr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY_PROWLARR}
      - NB_HOSTNAME=prowlarr
    volumes:
      - ./config/config_netbird_prowlarr/etc:/etc/netbird
      - ./config/config_netbird_prowlarr/var:/var/lib/netbird
    restart: unless-stopped

  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    network_mode: service:netbird
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./config/config_prowlarr:/config
    depends_on:
      - netbird
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_prowlarr
    network_mode: service:netbird
    volumes:
      - ./caddy/Caddyfile.prowlarr:/etc/caddy/Caddyfile:ro
      - ./config/config_caddy_prowlarr/data:/data
      - ./config/config_caddy_prowlarr/config:/config
    depends_on:
      - netbird
      - prowlarr
    restart: unless-stopped
