---
services:
  netbird:
    image: netbirdio/netbird:latest
    container_name: netbird_lidarr
    cap_add:
      - NET_ADMIN
      - SYS_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      - NB_SETUP_KEY=${NB_SETUP_KEY_LIDARR}
      - NB_HOSTNAME=lidarr
      - NB_ROSENPASS_ENABLED=true
      - NB_ROSENPASS_PERMISSIVE=true
    volumes:
      - ./config/config_netbird_lidarr/etc:/etc/netbird
      - ./config/config_netbird_lidarr/var:/var/lib/netbird
    restart: unless-stopped

  lidarr:
    image: lscr.io/linuxserver/lidarr:latest
    container_name: lidarr
    network_mode: service:netbird
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./config/config_lidarr:/config
      - ./music:/music
      - ./downloads:/downloads
    depends_on:
      - netbird
    restart: unless-stopped

  caddy:
    image: caddy:alpine
    container_name: caddy_lidarr
    network_mode: service:netbird
    volumes:
      - ./caddy/Caddyfile.lidarr:/etc/caddy/Caddyfile:ro
      - ./config/config_caddy_lidarr/data:/data
      - ./config/config_caddy_lidarr/config:/config
    depends_on:
      - netbird
      - lidarr
    restart: unless-stopped
